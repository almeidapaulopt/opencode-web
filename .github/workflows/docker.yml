name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - .github/workflows/docker.yml
  schedule:
    - cron: "0 */6 * * *" # every 6 hours
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/opencode-web

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for new opencode release
        id: check
        run: |
          LATEST=$(gh api repos/anomalyco/opencode/releases/latest --jq '.tag_name')
          CURRENT=$(cat .opencode-version 2>/dev/null || echo "none")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"

          if [ "$LATEST" != "$CURRENT" ]; then
            echo "New version found: $CURRENT -> $LATEST"
            echo "$LATEST" > .opencode-version
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new version ($CURRENT)"
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        if: steps.check.outputs.should_build == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .opencode-version
          git commit -m "bump opencode to ${{ steps.check.outputs.latest }}"
          git push

  build:
    needs: check-and-build
    if: needs.check-and-build.outputs.should_build == 'true' || github.event_name != 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=
            type=raw,value={{date `YYYYMMDD`}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
